<!DOCTYPE html>
<html>
<head>
<title>AlphaScope Terminal</title>
<style>
body { background:#050507; color:#fff; font-family:Inter; }

.top { display:flex; justify-content:space-between; padding:15px; }

.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:20px; padding:20px;
}

.card {
  background:#0d0d14;
  padding:15px;
  border-radius:12px;
}

.locked {
  filter:blur(4px);
  text-align:center;
}

.tag {
  font-size:10px;
  background:#111;
  padding:3px 6px;
  margin:2px;
}

.green { color:#00ffa3; }
.red { color:#ff4d4d; }

button {
  background:linear-gradient(90deg,#00ffa3,#00c3ff);
  padding:10px;
  border:none;
  cursor:pointer;
}

.wins {
  padding:10px;
  border-top:1px solid #111;
}
</style>
</head>

<body>

<div class="top">
  <h2>AlphaScope</h2>
  <button onclick="upgrade()">Unlock Premium</button>
</div>

<div id="wins" class="wins"></div>
<div class="grid" id="grid"></div>

<script>
const userId = localStorage.getItem("userId") || Date.now();
localStorage.setItem("userId", userId);

async function upgrade(){
  const r = await fetch("/create-payment",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({userId})
  });
  const d = await r.json();
  if(d.url) window.location.href = d.url;
}

async function load(){
  const r = await fetch(`/early?userId=${userId}`);
  const d = await r.json();

  const grid = document.getElementById("grid");
  const wins = document.getElementById("wins");

  wins.innerHTML = "<b>Recent Wins:</b> " +
    d.recentWins.map(w => `${w.symbol} +${w.pnl}%`).join(" | ");

  grid.innerHTML = "";

  d.signals.forEach(s=>{
    const el = document.createElement("div");
    el.className = "card";

    if (s.locked) {
      el.classList.add("locked");
      el.innerHTML = `
        🔒 Premium Signal
        <br><br>
        Unlock to see this alpha
      `;
    } else {
      const pnlClass = s.pnl >= 0 ? "green" : "red";

      el.innerHTML = `
        <b>${s.token} (${s.symbol})</b><br>
        Score: ${s.score}<br>
        Price: $${s.price}<br>
        PnL: <span class="${pnlClass}">${s.pnl}%</span><br>
        Age: ${s.age}m<br>
        ${s.tags.map(t=>`<span class="tag">${t}</span>`).join("")}
      `;
    }

    grid.appendChild(el);
  });
}

setInterval(load,4000);
load();
</script>

</body>
</html>
