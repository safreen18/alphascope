<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AlphaScope</title>

<style>
body {
  margin: 0;
  font-family: monospace;
  background: #020617;
  color: #e2e8f0;
  width: 420px;
}

/* TOP BAR */
.topbar {
  display: flex;
  justify-content: space-between;
  padding: 10px;
  font-size: 12px;
  border-bottom: 1px solid #1e293b;
}

.brand {
  color: #38bdf8;
  font-weight: bold;
}

.status {
  color: #22c55e;
}

/* CONTROLS */
.controls {
  padding: 8px;
}

button {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  border: none;
  border-radius: 6px;
  background: #0f172a;
  color: #94a3b8;
  cursor: pointer;
}

button:hover {
  background: #1e293b;
}

/* TABLE */
.table {
  width: 100%;
  font-size: 12px;
  border-collapse: collapse;
}

.row {
  display: grid;
  grid-template-columns: 1.2fr 0.8fr 1fr 1fr 0.8fr;
  padding: 8px;
  border-bottom: 1px solid #0f172a;
}

.row.header {
  color: #64748b;
  font-size: 11px;
}

.row.data:hover {
  background: rgba(56,189,248,0.05);
}

.token {
  color: #38bdf8;
  font-weight: bold;
}

.hot {
  color: #22c55e;
}

.badge {
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 4px;
}

.A { color: #22c55e; }
.B { color: #f59e0b; }
.C { color: #ef4444; }

.lock {
  text-align: center;
  padding: 10px;
  color: #f59e0b;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="brand">AlphaScope</div>
  <div class="status">LIVE</div>
</div>

<div class="controls">
  <button id="loadSignals">Scan Market</button>
  <button id="upgradeBtn">Upgrade</button>
</div>

<div id="signals"></div>

<script src="popup.js"></script>

</body>
</html>
