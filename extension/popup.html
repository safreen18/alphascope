<!DOCTYPE html>
<html>
<head>
  <title>AlphaScope</title>
  <style>
    body {
      width: 320px;
      font-family: Arial;
      background: #0f172a;
      color: white;
      padding: 10px;
    }

    h2 {
      margin-bottom: 10px;
    }

    button {
      width: 100%;
      margin: 5px 0;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #1d4ed8;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #2563eb;
    }

    #upgradeBtn {
      background: #16a34a;
      font-weight: bold;
    }

    #upgradeBtn:hover {
      background: #22c55e;
    }

    #output {
      margin-top: 10px;
      font-size: 12px;
      white-space: pre-line;
    }
  </style>
</head>
<body>

  <h2>🚀 AlphaScope</h2>

  <button id="earlyBtn">Early Buy</button>
  <button id="walletBtn">Wallet Tracker</button>
  <button id="trendBtn">Trending</button>

  <!-- 🔥 NEW BUTTON -->
  <button id="upgradeBtn">Upgrade 🚀</button>

  <div id="output">Ready...</div>

  <script src="popup.js"></script>

</body>
</html>
