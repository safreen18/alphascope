<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AlphaScope</title>

<style>

/* 🌌 BACKGROUND */
body {
  margin:0;
  width:360px;
  padding:16px;
  font-family: Inter, -apple-system, BlinkMacSystemFont;
  background: radial-gradient(circle at top,#0f172a,#020617);
  color:#e5e7eb;
}

/* HEADER */
.header {
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:14px;
}

.title {
  font-size:18px;
  font-weight:600;
  background:linear-gradient(90deg,#00ffd5,#3b82f6);
  -webkit-background-clip:text;
  color:transparent;
}

.status {
  font-size:10px;
  opacity:.6;
}

/* CHAIN SELECTOR */
.chains {
  display:flex;
  gap:6px;
  margin-bottom:14px;
}

.chain-btn {
  flex:1;
  padding:8px;
  border-radius:10px;
  border:1px solid rgba(255,255,255,0.05);
  background:rgba(255,255,255,0.03);
  backdrop-filter:blur(10px);
  color:#aaa;
  transition:0.2s;
}

.chain-btn.active {
  background:linear-gradient(90deg,#00ffd5,#3b82f6);
  color:#000;
  font-weight:600;
}

/* 🧊 CARD */
.card {
  position:relative;
  padding:16px;
  margin-bottom:14px;
  border-radius:18px;
  background:rgba(255,255,255,0.03);
  backdrop-filter:blur(20px);
  border:1px solid rgba(255,255,255,0.06);
  box-shadow:0 20px 50px rgba(0,0,0,0.8);
  transition:0.25s;
}

.card:hover {
  transform:translateY(-3px);
}

/* STRONG SIGNAL */
.card.strong {
  border:1px solid rgba(0,255,213,0.5);
  box-shadow:0 0 25px rgba(0,255,213,0.4);
}

/* TOP TAG */
.top {
  position:absolute;
  top:10px;
  right:10px;
  font-size:9px;
  padding:4px 8px;
  border-radius:8px;
  background:linear-gradient(90deg,#00ffd5,#3b82f6);
  color:#000;
  font-weight:600;
}

/* TOKEN */
.token {
  font-size:15px;
  font-weight:600;
}

.symbol {
  font-size:11px;
  opacity:.5;
}

/* PRICE */
.price {
  margin:10px 0;
  font-size:20px;
  font-weight:600;
  color:#00ffd5;
}

/* META */
.meta {
  display:flex;
  justify-content:space-between;
  font-size:11px;
  opacity:.7;
}

/* BADGES */
.badges {
  margin-top:10px;
  display:flex;
  gap:6px;
}

.whale {
  padding:4px 8px;
  border-radius:10px;
  background:linear-gradient(90deg,#9333ea,#6d28d9);
  font-size:10px;
}

.entry {
  padding:4px 8px;
  border-radius:10px;
  background:linear-gradient(90deg,#00ffd5,#3b82f6);
  color:#000;
  font-size:10px;
}

/* 🧠 INSIGHT PANEL */
.insight {
  margin-top:12px;
  padding:12px;
  border-radius:12px;
  background:rgba(0,0,0,0.6);
  border:1px solid rgba(255,255,255,0.05);
  font-size:12px;
}

/* CTA */
.cta {
  margin-top:10px;
  padding:16px;
  border-radius:16px;
  background:linear-gradient(180deg,rgba(0,255,213,0.1),rgba(0,0,0,0.8));
  text-align:center;
}

.cta button {
  margin-top:10px;
  width:100%;
  padding:10px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#00ffd5,#3b82f6);
  font-weight:600;
  font-size:13px;
}

/* LOADER */
.loader {
  text-align:center;
  opacity:.6;
}

/* EMPTY */
.empty {
  text-align:center;
  opacity:.5;
}

</style>
</head>

<body>

<div class="header">
  <div class="title">AlphaScope</div>
  <div class="status">LIVE</div>
</div>

<div class="chains">
  <button class="chain-btn active" data-chain="all">ALL</button>
  <button class="chain-btn" data-chain="ethereum">ETH</button>
  <button class="chain-btn" data-chain="bsc">BSC</button>
  <button class="chain-btn" data-chain="solana">SOL</button>
</div>

<div id="signals"></div>

<script src="popup.js"></script>

</body>
</html>
