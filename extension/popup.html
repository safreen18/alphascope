<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AlphaScope Terminal</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

<div id="terminal">

  <div id="header">
    <h2>AlphaScope Terminal</h2>
    <span id="status">● LIVE</span>
  </div>

  <div id="main">

    <div id="graph-container">
      <svg id="graph"></svg>
    </div>

    <div id="side-panel">

      <div class="panel">
        <h3>Wallet</h3>
        <div id="wallet-info">Select a node</div>
      </div>

      <div class="panel">
        <h3>Signals</h3>
        <div id="signals"></div>
      </div>

      <div class="panel">
        <h3>Copy Trades</h3>
        <div id="copy-feed"></div>
      </div>

      <!-- 🔥 NEW PANEL -->
      <div class="panel">
        <h3>Top Wallets</h3>
        <div id="wallet-stats"></div>
      </div>

    </div>

  </div>

</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="popup.js"></script>

</body>
</html>
