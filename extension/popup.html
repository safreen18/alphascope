<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AlphaScope</title>

<style>
body {
  margin:0;
  background: radial-gradient(circle at top,#0f172a,#020617);
  color:#e2e8f0;
  font-family:Segoe UI;
  width:360px;
  padding:16px;
}

.header{text-align:center;margin-bottom:12px;}
.header h1{color:#00ffd5;font-size:20px;}
.sub{font-size:11px;opacity:.5;}

/* CHAIN SELECTOR */
.chains {
  display:flex;
  gap:6px;
  margin-bottom:10px;
}

.chain-btn {
  flex:1;
  padding:6px;
  font-size:11px;
  border-radius:6px;
  border:none;
  background:#111827;
  color:#aaa;
  cursor:pointer;
}

.chain-btn.active {
  background:#00ffd5;
  color:#000;
  font-weight:bold;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.035);
  border-radius:14px;
  padding:14px;
  margin-bottom:12px;
}

.token{font-weight:bold;}
.symbol{font-size:11px;opacity:.5;}

.price{color:#00ffd5;margin:6px 0;}
.meta{font-size:11px;opacity:.7;display:flex;justify-content:space-between;}

.overlay{
  text-align:center;
  padding:12px;
  background:rgba(0,0,0,.7);
  border-radius:10px;
}

button{
  margin-top:8px;
  padding:8px;
  width:100%;
  background:#00ffd5;
  border:none;
  border-radius:6px;
}

.empty{
  text-align:center;
  font-size:12px;
  opacity:.6;
}
</style>
</head>

<body>

<div class="header">
  <h1>🚀 AlphaScope</h1>
  <div class="sub">Smart Money Terminal</div>
</div>

<!-- 🔥 CHAIN SELECTOR -->
<div class="chains">
  <button class="chain-btn active" data-chain="all">ALL</button>
  <button class="chain-btn" data-chain="ethereum">ETH</button>
  <button class="chain-btn" data-chain="bsc">BSC</button>
  <button class="chain-btn" data-chain="solana">SOL</button>
</div>

<div id="signals">Loading signals...</div>

<script src="popup.js"></script>

</body>
</html>
