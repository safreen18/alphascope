<!DOCTYPE html>
<html>
<head>
  <title>AlphaScope</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      width: 350px;
    }

    header {
      padding: 15px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      background: #020617;
      border-bottom: 1px solid #334155;
    }

    #controls {
      display: flex;
      justify-content: space-around;
      padding: 10px;
    }

    button {
      background: #3b82f6;
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      font-size: 12px;
    }

    button:hover {
      background: #2563eb;
    }

    #signals {
      max-height: 400px;
      overflow-y: auto;
      padding: 10px;
    }

    .card {
      background: #020617;
      border: 1px solid #334155;
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 10px;
    }

    .token {
      font-size: 16px;
      font-weight: bold;
    }

    .chain {
      font-size: 11px;
      opacity: 0.7;
    }

    .row {
      font-size: 12px;
      margin-top: 4px;
    }

    .score {
      color: #22c55e;
      font-weight: bold;
    }

    .whale {
      color: #38bdf8;
    }

    .upgrade {
      margin: 10px;
      text-align: center;
    }

    .upgrade button {
      background: #f59e0b;
      width: 90%;
    }
  </style>
</head>

<body>

<header>🚀 AlphaScope</header>

<div id="controls">
  <button id="loadSignals">Early Signals</button>
  <button id="wallet">Wallet</button>
  <button id="trend">Trending</button>
</div>

<div id="signals"></div>

<div class="upgrade">
  <button id="upgradeBtn">Upgrade to Premium</button>
</div>

<script src="popup.js"></script>
</body>
</html>
