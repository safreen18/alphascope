<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>AlphaScope</title>

<style>
body{
  margin:0;
  width:360px;
  padding:16px;
  background:#020617;
  color:#fff;
  font-family:Inter;
}

.tab{
  display:flex;
  gap:6px;
  margin-bottom:12px;
}

.tab button{
  flex:1;
  padding:8px;
  border:none;
  border-radius:10px;
  background:#111;
  color:#aaa;
  cursor:pointer;
}

.tab button.active{
  background:#00ffd5;
  color:#000;
}

.card{
  padding:12px;
  border-radius:12px;
  background:#111;
  margin-bottom:10px;
}

.win{
  color:#00ffd5;
}

</style>
</head>

<body>

<div class="tab">
  <button id="liveBtn" class="active">LIVE</button>
  <button id="historyBtn">TRACK RECORD</button>
</div>

<div id="content"></div>

<script src="popup.js"></script>

</body>
</html>
